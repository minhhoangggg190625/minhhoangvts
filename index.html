<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Demo Responsive</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

/* HEADER */
.header {
  background: #fff;
  border-bottom: 4px solid #bc2772;
  padding: 15px 0;
  margin-bottom: 10px;
}

.header h2 {
  margin: 0;
  text-align: center;
  color: #bc2772;
}

/* CONTAINER */
.container {
  width: 95%;
  max-width: 1200px;
  margin: auto;
  position: relative;
}

/* ADDRESS */
.address-box {
  background: #fff;
  padding: 15px;
  margin: 15px 0;
  border-radius: 6px;
  text-align: center;
}

.address {
  background: #eee;
  padding: 8px;
  margin: 10px 0;
  border: 1px solid #bc2772;
}

.btn {
  padding: 6px 10px;
  border: none;
  cursor: pointer;
  margin: 3px;
}

.btn-copy { background: gray; color: white; }
.btn-random { background: #bc2772; color: white; position: relative; }

/* STICKER trên Random */
.sticker {
  display: inline-block;
  background: #1e90ff;
  color: white;
  font-size: 12px;
  padding: 2px 4px;
  margin-left: 5px;
  border-radius: 4px;
  vertical-align: middle;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

/* FILTER */
.filter-box {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  background: #eee;
  padding: 10px;
  margin-bottom: 5px;
}

.filter-box input,
.filter-box select {
  flex: 1 1 150px;
  padding: 8px;
  min-width: 100px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  position: relative;
}

/* SPINNER CENTER */
.spinner-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  text-align: center;
  z-index: 10;
  background: rgba(255,255,255,0.8);
  padding: 20px;
  border-radius: 8px;
}

.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #bc2772;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading-text {
  font-size: 14px;
  color: #555;
  margin-top: 8px;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 4px;
  border: 1px solid #eee;
  overflow: hidden;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

/* LINK */
.card a {
  text-decoration: none;
  color: inherit;
  display: block;
}

/* IMAGE */
.img-box {
  position: relative;
  width: 100%;
  padding-top: 100%;
  background: #fafafa;
}

.img-box img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BADGE */
.badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: #bc2772;
  color: #fff;
  font-size: 10px;
  padding: 2px 5px;
}

/* INFO */
.info {
  padding: 6px;
}

.name {
  font-size: 13px;
  height: 32px;
  overflow: hidden;
  color: #000;
}

.price {
  color: #bc2772;
  font-weight: bold;
  font-size: 15px;
  margin: 4px 0;
}

/* META */
.meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
}

.rating { color: #f5a623; }
.rating span { color: #555; }

.sold { color: #000; }

/* BUTTON */
.btn-buy {
  width: 100%;
  border: none;
  background: #bc2772;
  color: white;
  padding: 8px;
  cursor: pointer;
  font-size: 13px;
}

.btn-buy:hover {
  background: #991e60;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  }
  .filter-box input, .filter-box select {
    flex: 1 1 100%;
  }
}
@media (max-width: 480px) {
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  }
  .header h2 {
    font-size: 18px;
  }
  .price {
    font-size: 14px;
  }
  .name {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 DANH SÁCH SẢN PHẨM</h2>
</div>

<div class="container">

<!-- ADDRESS -->
<div class="address-box">
  <button class="btn btn-random" onclick="randomAddress()">
    🎲 Random <span class="sticker">🔥</span>
  </button>
  <div id="address" class="address"></div>
  <button class="btn btn-copy" onclick="copyAddress()">Copy</button>
</div>

<!-- FILTER -->
<div class="filter-box">
  <input type="text" id="search" placeholder="Tìm sản phẩm...">
  <input type="number" id="money" placeholder="Số tiền (đ)">
  <select id="sort">
    <option value="desc">Giá: Cao → Thấp</option>
    <option value="asc">Giá: Thấp → Cao</option>
  </select>
</div>

<!-- LIST -->
<div id="product-list" class="grid"></div>

<!-- SPINNER CENTER -->
<div class="spinner-overlay" id="spinner-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Đang cập nhật kho hàng...</div>
</div>

</div>

<script>

// ADDRESS
const addresses = [
  "269 Bùi Xương Trạch",
  "12 Nguyễn Trãi",
  "45 Lê Lợi",
  "78 Trần Hưng Đạo"
];

function randomAddress() {
  const i = Math.floor(Math.random() * addresses.length);
  document.getElementById("address").innerText = addresses[i];
}

function copyAddress() {
  const text = document.getElementById("address").innerText;
  navigator.clipboard.writeText(text);
  alert("Đã copy!");
}

// FORMAT SOLD
function formatSold(n) {
  return n >= 1000 ? (n/1000).toFixed(1)+"k" : n;
}

// DATA SẢN PHẨM 50 SP
const products = [];
for (let i = 1; i <= 50; i++) {
  products.push({
    name: `Điện thoại ${i}`,
    price: Math.floor(Math.random() * 15000000) + 3000000,
    rating: (Math.random() * 2 + 3).toFixed(1),
    sold: Math.floor(Math.random() * 2000),
    image: `https://picsum.photos/300?${i}`,
    link: "https://shopee.vn/"
  });
}

// RENDER
function renderProducts(list, initial=false) {
  const box = document.getElementById("product-list");
  box.innerHTML = "";
  let showList = initial ? list.slice(0,5) : list;

  showList.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <a href="${p.link}" target="_blank">
          <div class="img-box">
            <div class="badge">Mall</div>
            <img src="${p.image}">
          </div>
          <div class="info">
            <div class="name">${p.name}</div>
            <div class="price">₫${p.price.toLocaleString()}</div>
            <div class="meta">
              <div class="rating">⭐ <span>${p.rating}</span></div>
              <div class="sold">Đã bán ${formatSold(p.sold)}</div>
            </div>
          </div>
        </a>
        <button class="btn-buy" onclick="window.open('${p.link}','_blank')">Mua ngay</button>
      </div>
    `;
  });
}

// FILTER với spinner
function filterProducts() {
  const overlay = document.getElementById("spinner-overlay");
  overlay.style.display = "block";

  setTimeout(() => {
    let list = [...products];
    const s = search.value.toLowerCase();
    const m = money.value;
    const sort = sortEl.value;

    if (s) list = list.filter(p => p.name.toLowerCase().includes(s));
    if (m) list = list.filter(p => p.price <= m);

    list.sort((a,b)=> sort==="asc"? a.price-b.price : b.price-a.price);

    renderProducts(list);
    overlay.style.display = "none";
  }, 800);
}

const search = document.getElementById("search");
const money = document.getElementById("money");
const sortEl = document.getElementById("sort");

search.oninput = filterProducts;
money.oninput = filterProducts;
sortEl.onchange = filterProducts;

// LOAD
window.onload = () => {
  randomAddress();
  renderProducts(products, true);
};
</script>

</body>
</html>
