<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">

<title>Tự động lấy đơn SPAYLATER</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
}

/* HEADER */

.header{
  background:#bc2772;
  color:white;
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

/* BANNER */

.slider{
  width:95%;
  max-width:1200px;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.slider img{
  width:100%;
  display:block;
}

/* CONTAINER */

.container{
  width:95%;
  max-width:1200px;
  margin:auto;
}

/* ADDRESS */

.address-box{
  background:white;
  padding:20px;
  border-radius:8px;
  margin-bottom:20px;
  text-align:center;
}

.address{
  background:#eee;
  padding:12px;
  border:1px solid #bc2772;
  margin:12px 0;
  font-size:16px;
  border-radius:5px;
}

/* BUTTON */

.btn{
  border:none;
  padding:10px 14px;
  cursor:pointer;
  font-weight:bold;
  border-radius:5px;
  margin:5px;
}

.btn-random{
  background:#ff9800;
  color:white;
  animation:bounce 1s infinite;
}

.btn-copy{
  background:#ff5722;
  color:white;
}

@keyframes bounce{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-4px);
  }

}

/* FILTER */

.filter-box{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  background:#eee;
  padding:12px;
  border-radius:8px;
  margin-bottom:20px;
}

.filter-box input,
.filter-box select{
  flex:1;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

/* CARD */

.card{
  background:white;
  border-radius:8px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.info{
  padding:10px;
}

.name{
  height:42px;
  overflow:hidden;
  font-size:15px;
}

.price{
  color:#bc2772;
  font-size:18px;
  font-weight:bold;
  margin:8px 0;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

.btn-buy{
  width:100%;
  border:none;
  background:#bc2772;
  color:white;
  padding:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-buy:hover{
  background:#991e60;
}

/* MOBILE */

@media(max-width:600px){

  .grid{
    grid-template-columns:
    repeat(auto-fill,minmax(160px,1fr));
  }

}

</style>
</head>

<body>

<div class="header">
🛒 DANH SÁCH SẢN PHẨM
</div>

<!-- BANNER -->

<div class="slider">
  <img src="https://github.com/minhhoangggg190625/h-nh-webdd/blob/main/15.jpg?raw=true">
</div>

<div class="container">

  <!-- RANDOM ADDRESS -->

  <div class="address-box">

    <button
      class="btn btn-random"
      onclick="randomAddress()"
    >
      🎲 Random
    </button>

    <div
      id="address"
      class="address"
    ></div>

    <button
      class="btn btn-copy"
      onclick="copyAddress()"
    >
      Copy
    </button>

  </div>

  <!-- FILTER -->

  <div class="filter-box">

    <input
      type="text"
      id="search"
      placeholder="Tìm sản phẩm..."
    >

    <input
      type="number"
      id="money"
      placeholder="Số tiền tối đa"
    >

    <select id="sort">

      <option value="desc">
        Giá cao → thấp
      </option>

      <option value="asc">
        Giá thấp → cao
      </option>

    </select>

  </div>

  <!-- PRODUCTS -->

  <div
    id="product-list"
    class="grid"
  ></div>

</div>

<script>

/* =========================================
   TOẠ ĐỘ NHÀ
========================================= */

const HOME_LAT =
10.833053123546762;

const HOME_LNG =
106.70668800826569;

/* =========================================
   ĐƯỜNG + PHƯỜNG THẬT
========================================= */

const locations = [

{
  street:"Bình Lợi",
  ward:"Phường Bình Lợi Trung"
},


{
  street:"Nguyễn Xí",
  ward:"Phường Bình Lợi Trung"
},

{
  street:"Đặng Thùy Trâm",
  ward:"Phường Bình Lợi Trung"
},

{
  street:"Nơ Trang Long",
  ward:"Phường Bình Thạnh"
},


{
  street:"Chu Văn An",
  ward:"Phường Bình Thạnh"
}


];

/* =========================================
   RANDOM SỐ NHÀ
========================================= */

function randomHouse(){

  const a =
  Math.floor(Math.random()*250)+1;

  const b =
  Math.floor(Math.random()*60)+1;

  const c =
  Math.floor(Math.random()*30)+1;

  const type =
  Math.floor(Math.random()*3);

  if(type===0){

    return `${a}`;

  }

  if(type===1){

    return `${a} / ${b}`;

  }

  return `${a} / ${b} / ${c}`;

}

/* =========================================
   RANDOM TOẠ ĐỘ 1-3KM
========================================= */

function randomNearbyPoint(){

  const radius =
  Math.random()*1000 + 3000;

  const angle =
  Math.random()*2*Math.PI;

  const dx =
  radius*Math.cos(angle);

  const dy =
  radius*Math.sin(angle);

  const lat =
  HOME_LAT + (dy/111320);

  const lng =
  HOME_LNG + (
    dx /
    (
      111320 *
      Math.cos(HOME_LAT*Math.PI/180)
    )
  );

  return {lat,lng};

}

/* =========================================
   RANDOM ĐỊA CHỈ
========================================= */

function randomAddress(){

  const point =
  randomNearbyPoint();

  const location =
  locations[
    Math.floor(
      Math.random()*locations.length
    )
  ];

  const house =
  randomHouse();

  const finalAddress =
  `${house} ${location.street} , ${location.ward}, Tp. Hồ Chí Minh`;

  document.getElementById("address")
  .innerText = finalAddress;

  console.log(point);

}

/* =========================================
   COPY
========================================= */

function copyAddress(){

  navigator.clipboard.writeText(
    document.getElementById("address").innerText
  );

  alert("Đã copy!");

}

/* =========================================
   PRODUCTS
========================================= */

const products = [

{
  name:"Samsung Galaxy A07 4GB/128GB",
  price:2200000,
  rating:4.3,
  sold:950,
  image:"https://down-vn.img.susercontent.com/file/vn-11134207-81ztc-mlac3o5eghs204.webp",
  link:"https://s.shopee.vn/6VJlDpkC1x"
},

{
  name:"Xiaomi Redmi 15C 4GB/128GB",
  price:2590000,
  rating:4.6,
  sold:2000,
  image:"https://down-vn.img.susercontent.com/file/vn-11134207-81ztc-mmu6p26yrair49.webp",
  link:"https://s.shopee.vn/1VvWLLR1uR"
},

{
  name:"Samsung Galaxy A56 5G 8GB/128GB",
  price:6880000,
  rating:4.7,
  sold:1100,
  image:"https://down-vn.img.susercontent.com/file/vn-11134207-820l4-mfdhbz7f07bdad@resize_w450_nl.webp",
  link:"https://s.shopee.vn/7Ktx1eMwXo"
}

];

/* =========================================
   RENDER PRODUCTS
========================================= */

function renderProducts(list){

  const box =
  document.getElementById("product-list");

  box.innerHTML = "";

  list.forEach(p=>{

    const card =
    document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <a href="${p.link}" target="_blank">

        <img src="${p.image}">

        <div class="info">

          <div class="name">
            ${p.name}
          </div>

          <div class="price">
            ₫${p.price.toLocaleString()}
          </div>

          <div class="meta">

            <div>
              ⭐ ${p.rating}
            </div>

            <div>
              Đã bán ${p.sold}
            </div>

          </div>

        </div>

      </a>

      <button
      class="btn-buy"
      onclick="window.open('${p.link}','_blank')">

      Mua ngay

      </button>

    `;

    box.appendChild(card);

  });

}

/* =========================================
   FILTER
========================================= */

function filterProducts(){

  let list = [...products];

  const keyword =
  document.getElementById("search")
  .value
  .toLowerCase();

  const money =
  document.getElementById("money")
  .value;

  const sort =
  document.getElementById("sort")
  .value;

  if(keyword){

    list =
    list.filter(p=>
      p.name
      .toLowerCase()
      .includes(keyword)
    );

  }

  if(money){

    list =
    list.filter(p=>
      p.price <= money
    );

  }

  list.sort((a,b)=>

    sort==="asc"
    ? a.price-b.price
    : b.price-a.price

  );

  renderProducts(list);

}

/* =========================================
   EVENTS
========================================= */

document.getElementById("search")
.oninput = filterProducts;

document.getElementById("money")
.oninput = filterProducts;

document.getElementById("sort")
.onchange = filterProducts;

/* =========================================
   LOAD
========================================= */

window.onload = ()=>{

  randomAddress();

  renderProducts(products);

};

</script>

</body>
</html>
