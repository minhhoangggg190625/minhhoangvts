<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LẤY ĐƠN VÍ SPAYLATER</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #ff9a9e, #bc2772);
  color: #fff;
  padding: 20px 0;
  text-align: center;
  font-weight: bold;
  font-size: 26px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

/* BANNER */
.slider {
  width: 95%;
  max-width: 1200px;
  height: 450px; /* tăng chiều cao */
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  background: #bc2772; /* nền khi ảnh chưa load */
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 10px;
}

/* CONTAINER */
.container {
  width: 95%;
  max-width: 1200px;
  margin: auto;
}

/* ADDRESS */
.address-box {
  background: #fff;
  padding: 20px;
  margin: 15px 0;
  border-radius: 6px;
  text-align: center;
}

.address {
  background: #eee;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #bc2772;
  font-size: 16px;
}

/* BUTTONS */
.btn {
  padding: 8px 12px;
  border: none;
  cursor: pointer;
  margin: 3px;
  font-weight: bold;
}

.btn-copy { 
  background: #ff5722; 
  color: white; 
  font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-copy:hover {
  transform: scale(1.1);
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}

.btn-random { 
  background: #bc2772; 
  color: white; 
  position: relative;
  font-size: 16px;
}

/* STICKER Random */
.sticker {
  display: inline-block;
  background: linear-gradient(45deg,#ff5722,#ff9800);
  color: white;
  font-size: 14px;
  padding: 3px 6px;
  margin-left: 5px;
  border-radius: 4px;
  vertical-align: middle;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* FILTER */
.filter-box {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  background: #eee;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
}

.filter-box input,
.filter-box select {
  flex: 1 1 180px;
  padding: 10px;
  min-width: 120px;
  border-radius: 4px;
  border: 1px solid #ccc;
  transition: 0.3s;
}

.filter-box input:focus,
.filter-box select:focus {
  outline: none;
  border-color: #bc2772;
  box-shadow: 0 0 6px rgba(188,39,114,0.5);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  min-height: 300px;
}

/* SPINNER */
.spinner-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  text-align: center;
  z-index: 9999;
  background: rgba(255,255,255,0.95);
  padding: 25px 40px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.spinner {
  border: 5px solid #f3f3f3;
  border-top: 5px solid #bc2772;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading-text {
  font-size: 16px;
  color: #555;
  margin-top: 10px;
  font-weight: bold;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 6px;
  border: 1px solid #eee;
  overflow: hidden;
  transition: 0.4s;
  position: relative;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

.card a {
  text-decoration: none;
  color: inherit;
  display: block;
}

.img-box {
  position: relative;
  width: 100%;
  padding-top: 100%;
  background: #fafafa;
  overflow: hidden;
}

.img-box img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s;
}

.card:hover .img-box img {
  transform: scale(1.1);
}

.badge {
  position: absolute;
  top: 8px;
  left: 8px;
  color: #fff;
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  animation: badgeGlow 1.5s infinite alternate;
}

@keyframes badgeGlow {
  0% { box-shadow: 0 0 4px rgba(255,255,255,0.5);}
  100% { box-shadow: 0 0 12px rgba(255,255,255,0.9);}
}

.badge.mall { background: #bc2772; }
.badge.sale { background: #ff5722; }
.badge.new { background: #1e90ff; }
.badge.hot { background: #ff9800; }

.info {
  padding: 10px;
}

.name {
  font-size: 16px;
  height: 40px;
  overflow: hidden;
  color: #000;
}

.price {
  color: #bc2772;
  font-weight: bold;
  font-size: 18px;
  margin: 6px 0;
}

.meta {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}

.rating { color: #f5a623; }
.rating span { color: #555; }

.sold { color: #000; }

@keyframes bounceBtn {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.btn-buy {
  width: 100%;
  border: none;
  background: #bc2772;
  color: white;
  padding: 10px;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
  animation: bounceBtn 1s infinite;
  transition: 0.3s;
}

.btn-buy:hover {
  transform: scale(1.07);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  background: #991e60;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .filter-box input, .filter-box select { flex: 1 1 100%; }
}
@media (max-width: 480px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .header { font-size: 20px; }
  .price { font-size: 16px; }
  .name { font-size: 14px; }
  .img-box img { height: auto; }
}
</style>
</head>
<body>

<div class="header">🛒 DANH SÁCH SẢN PHẨM</div>

<!-- BANNER CHỈ 1 ẢNH -->
<div class="slider">
  <img src="https://scontent.fsgn5-7.fna.fbcdn.net/v/t39.30808-6/661383124_1624121922128714_3909938372847597089_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=13d280&_nc_ohc=TqSkqnMInR8Q7kNvwEScPAh&_nc_oc=AdoTh-9lyV1m2yHzXzR2Sy8ksHYmfEQ6zOZ_tU1dNCNB00ecrxhmX2zQeMOU0Fhp5MsMVxNs0d4t5-6p6Q5Mossz&_nc_zt=23&_nc_ht=scontent.fsgn5-7.fna&_nc_gid=F37BPaGU8YtbMrZvIg-YEg&_nc_ss=7a32e&oh=00_AfytFisJkXJa39luooxUg_R-ddQRAKs9kQCcKLW8OqLmlA&oe=69CDF167" alt="Banner">
</div>

<div class="container">

<!-- ADDRESS -->
<div class="address-box">
  <button class="btn btn-random" onclick="randomAddress()">
    🎲 Random <span class="sticker">🔥</span>
  </button>
  <div id="address" class="address"></div>
  <button class="btn btn-copy" onclick="copyAddress()">Copy</button>
</div>

<!-- FILTER -->
<div class="filter-box">
  <input type="text" id="search" placeholder="Tìm sản phẩm...">
  <input type="number" id="money" placeholder="Số tiền (đ)">
  <select id="sort">
    <option value="desc">Giá: Cao → Thấp</option>
    <option value="asc">Giá: Thấp → Cao</option>
  </select>
</div>

<!-- LIST -->
<div id="product-list" class="grid"></div>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinner-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Đang cập nhật kho hàng...</div>
</div>

</div>

<script>
// ADDRESS
const addresses = ["269 Bùi Xương Trạch","12 Nguyễn Trãi","45 Lê Lợi","78 Trần Hưng Đạo"];
function randomAddress() {
  const i = Math.floor(Math.random()*addresses.length);
  document.getElementById("address").innerText = addresses[i];
}
function copyAddress() {
  navigator.clipboard.writeText(document.getElementById("address").innerText);
  alert("Đã copy!");
}

// FORMAT SOLD
function formatSold(n){ return n>=1000?(n/1000).toFixed(1)+"k":n; }

// PRODUCTS
const products = [];
const badges = ["sale","new","hot","mall"];
for(let i=1;i<=50;i++){
  products.push({
    name:`Điện thoại ${i}`,
    price: Math.floor(Math.random()*15000000)+3000000,
    rating:(Math.random()*2+3).toFixed(1),
    sold: Math.floor(Math.random()*2000),
    image:`https://picsum.photos/300?${i}`,
    link:"https://shopee.vn/",
    badge: badges[Math.floor(Math.random()*badges.length)]
  });
}

// ANIMATE SOLD
function animateCount(el,val){
  let current=0;
  const step=Math.ceil(val/50);
  const interval=setInterval(()=>{
    current+=step;
    if(current>=val){ current=val; clearInterval(interval);}
    el.innerText=current>=1000?(current/1000).toFixed(1)+"k":current;
  },15);
}

// RENDER
function renderProducts(list, initial=false){
  const box=document.getElementById("product-list");
  box.innerHTML="";
  let showList = initial?list.slice(0,5):list;
  showList.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <a href="${p.link}" target="_blank">
        <div class="img-box">
          <div class="badge ${p.badge}">${p.badge.toUpperCase()}</div>
          <img src="${p.image}" loading="lazy">
        </div>
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="price">₫${p.price.toLocaleString()}</div>
          <div class="meta">
            <div class="rating">⭐ <span>${p.rating}</span></div>
            <div class="sold" id="sold-${p.name.replace(/\s/g,"")}">0</div>
          </div>
        </div>
      </a>
      <button class="btn-buy" onclick="window.open('${p.link}','_blank')">Mua ngay</button>
    `;
    box.appendChild(card);
    animateCount(document.getElementById(`sold-${p.name.replace(/\s/g,"")}`),p.sold);
  });
}

// FILTER
function filterProducts(){
  const overlay=document.getElementById("spinner-overlay");
  overlay.style.display="block";
  setTimeout(()=>{
    let list=[...products];
    const s=search.value.toLowerCase();
    const m=money.value;
    const sort=sortEl.value;
    if(s) list=list.filter(p=>p.name.toLowerCase().includes(s));
    if(m) list=list.filter(p=>p.price<=m);
    list.sort((a,b)=>sort==="asc"?a.price-b.price:b.price-a.price);
    renderProducts(list);
    overlay.style.display="none";
  },500);
}

const search=document.getElementById("search");
const money=document.getElementById("money");
const sortEl=document.getElementById("sort");

search.oninput=filterProducts;
money.oninput=filterProducts;
sortEl.onchange=filterProducts;

window.onload=()=>{
  randomAddress();
  renderProducts(products,true);
};
</script>

</body>
</html>
